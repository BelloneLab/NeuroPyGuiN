name: neuropygui
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # numpy is pinned < 2 so Kilosort 4 and the IBL stack live happily in one env.
  - numpy<2
  - pandas
  - scipy
  - matplotlib
  - tqdm
  - numba
  - scikit-learn
  - imbalanced-learn
  - statsmodels
  - networkx
  - psutil
  - joblib
  - h5py
  - seaborn
  - cachecache
  - pyarrow
  - ipython
  # The py_bombcell unit-quality GUI runs as a Jupyter notebook with ipywidgets,
  # launched from the curation tab. Without these the GUI silently never opens.
  - ipywidgets
  - jupyterlab
  - cmcrameri
  - pillow
  - cupy
  - cuda-version=12
  - pip:
      # Pin below 6.8: pyqtgraph 0.13.x crashes (native Qt paint access violation)
      # on the Qt 6.10 that PySide6 6.10 ships; 6.7.x (Qt 6.7) is the tested baseline.
      - PySide6>=6.5,<6.8
      - pyqtgraph>=0.14.0,<0.15
      - upsetplot
      # --- Histology tab: native AP_histology workflow (slice prep, matching,
      #     alignment, probe tracing, MAT/CSV export) ---
      - tifffile
      - imagecodecs
      - opencv-python-headless
      # --- Histology channel map + optional IBL ephys-alignment GUI ---
      #     numpy<2 first so pip keeps ibllib on a Kilosort-compatible numpy.
      - numpy<2
      - ibllib
      - iblatlas
      - SimpleITK
      # The IBL apps repo (folder containing `atlaselectrophysiology`) must also be
      # on the path. Either clone https://github.com/int-brain-lab/iblapps and add
      # it to PYTHONPATH, or drop a `.pth` pointing at it into site-packages.

# --- phy curation runs in a SEPARATE conda env (typically "phy2") that owns
#     phy 2.0 / phylib. The bundled phy plugins need extra packages in THAT env,
#     not this one. See requirements-phy.txt. In short:
#       conda install -n <phy-env> -c conda-forge seaborn umap-learn
#     (seaborn -> mahalanobis plugin; umap-learn -> UMAP / recluster plugins.)
#     The gamepad plugin uses Windows XInput via ctypes (no dependency); pygame is
#     only a fallback for non-Windows / no-XInput setups.
